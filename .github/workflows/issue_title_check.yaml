name: Automatic Issue Labeler

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read

jobs:
  add-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Check issue title format
        id: check_format
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let labels;
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: '.github/labels.json'
              });
              const content = Buffer.from(data.content, 'base64').toString('utf8');
              labels = JSON.parse(content);
            } catch (e) {
              core.setFailed('.github/labels.json repoda bulunamıyor veya geçersiz. Dosyayı varsayılan branch\'e ekleyip push edin. Hata: ' + e.message);
              return false;
            }
            if (!labels || Object.keys(labels).length === 0) {
              core.setFailed('Labels configuration not found');
              return false;
            }
            const issueTitle = context.payload.issue.title;

            const labelGroups = issueTitle.match(/\[([^\]]+)\]/g);
            
            if (!labelGroups) {
              return false;
            }

            if (labelGroups.length !== Object.keys(labels).length) {
              return false;
            }

            const isValid = labelGroups.every((group, index) => {
              const tags = group.match(/[^,\[\]]+/g).map(tag => tag.trim());
              const field = Object.keys(labels)[index];
              const validLabels = labels[field];
              return tags.every(tag => validLabels.includes(tag));
            });

            return isValid;

      - name: Add comment and close issue if format is invalid
        if: ${{ steps.check_format.outputs.result == 'false' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/labels.json'
            });
            const labels = JSON.parse(Buffer.from(data.content, 'base64').toString('utf8'));
            const issueTitle = context.payload.issue.title;
            const labelGroups = issueTitle.match(/\[([^\]]+)\]/g);
            
            let errorReason = '';
            if (!labelGroups) {
              errorReason = 'Başlıkta hiç köşeli parantez ([]) bulunamadı.';
            } else if (labelGroups.length !== Object.keys(labels).length) {
              errorReason = `Başlıkta ${Object.keys(labels).length} adet etiket grubu olmalı, fakat ${labelGroups.length} adet bulundu.`;
            } else {
              const invalidTags = [];
              labelGroups.forEach((group, index) => {
                const tags = group.match(/[^,\[\]]+/g).map(tag => tag.trim());
                const field = Object.keys(labels)[index];
                const validLabels = labels[field];
                const invalidTagsInGroup = tags.filter(tag => !validLabels.includes(tag));
                if (invalidTagsInGroup.length > 0) {
                  invalidTags.push(`"${invalidTagsInGroup.join(', ')}" etiketleri "${field}" alanı için geçerli değil. Geçerli etiketler: ${validLabels.join(', ')}`);
                }
              });
              if (invalidTags.length > 0) {
                errorReason = 'Geçersiz etiketler bulundu:\n' + invalidTags.join('\n');
              }
            }

            // Format örnekleri oluştur
            const examples = [
              'Veli Bacik [mobile,backend][uzaktan][zorunlu][4-hafta]',
              'Ayşe Yılmaz [frontend][yüzyüze][gönüllü][6-hafta]',
              'Mehmet Demir [pm,qa][uzaktan][zorunlu][4-hafta]',
              'Zeynep Kaya [data-science][uzaktan][zorunlu][6-hafta]'
            ];
            
            // Geçerli etiketleri göster
            const validLabelsInfo = Object.entries(labels).map(([field, validLabels]) => {
              return `**${field}**: ${validLabels.join(', ')}`;
            }).join('\n');
            
            // Başlık düzeltme önerisi
            let suggestion = '';
            if (labelGroups && labelGroups.length > 0) {
              const nameMatch = issueTitle.match(/^([^\[]+)/);
              const name = nameMatch ? nameMatch[1].trim() : 'Ad Soyad';
              suggestion = `\n💡 **Önerilen Format:**\n\`${name} [ALAN][STAJ YERİ][STAJ TİPİ][STAJ SÜRESİ]\`\n`;
            }

            const comment = '## ⚠️ Format Hatası\n\n' +
              'Merhaba @' + context.actor + ', bu issue\'nun başlığı belirlenen formata uymuyor.\n\n' +
              '### 🔍 Hata Nedeni:\n' + errorReason + '\n\n' +
              '### 📋 Doğru Format:\nBaşlık şu formatta olmalıdır:\n' +
              '```\nAD-SOYAD [ALAN][STAJ YERİ][STAJ TİPİ][STAJ SÜRESİ]\n```\n\n' +
              '### ✅ Geçerli Etiketler:\n' + validLabelsInfo + '\n' + suggestion +
              '### 📝 Örnek Başlıklar:\n' + examples.map(ex => '- `' + ex + '`').join('\n') + '\n\n' +
              '### 🔗 Daha Fazla Bilgi:\nDetaylı örnekler için [README dosyasını](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '#-örnek-başvuru-başlıkları) inceleyebilirsiniz.\n\n---\n' +
              '💡 **Not:** Başlığı düzelttikten sonra issue otomatik olarak yeniden açılacaktır.';
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

      - name: Label the issue
        uses: actions/github-script@v7
        if: ${{ steps.check_format.outputs.result == 'true' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: '.github/labels.json'
            });
            const fields = JSON.parse(Buffer.from(data.content, 'base64').toString('utf8'));
            const title = context.payload.issue.title;
            const issue_number = context.issue.number;
            const issue_author = context.payload.issue.user.login;
            const issueUrl = context.payload.issue.html_url;
            const issueState = context.payload.issue.state;
            const labelsToAdd = new Set();

            const labelGroups = title.match(/\[([^\]]+)\]/g);
            
            if (!labelGroups) {
              return;
            }

            labelGroups.forEach(group => {
              const tags = group.match(/[^,\[\]]+/g).map(tag => tag.trim());
              tags.forEach(tag => {
                for (const [field, validLabels] of Object.entries(fields)) {
                  if (validLabels.includes(tag)) {
                    labelsToAdd.add(tag);
                    break; // Exit loop once we find a match
                  }
                }
              });
            });

            const wasClosed = issueState === 'closed';

            if (wasClosed) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue_number,
                state: 'open'
              });
            }

            if (labelsToAdd.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue_number,
                labels: Array.from(labelsToAdd)
              });
            }

            await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue_number,
                assignees: [issue_author]
              });

            const comment = 'Merhaba @' + context.actor + ', staj başvurun başarı ile taglendi.. ' +
              'Lütfen staj bulduktan sonra buraya gelip kapatmayı unutma. ' +
              'Şimdiden bol şans ve sakın unutma staj ne başlangıç ne son çok çalışmak lazım.';
            await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue_number,
                body: comment
              });
