name: Auto Matching

on:
  issues:
    types: [labeled]
  schedule:
    # Her gün saat 03:00'de çalışır (UTC)
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  match-companies-and-candidates:
    runs-on: ubuntu-latest
    # PASİF: Şirket–aday eşleştirme şu an kapalı; odak öğrenciler
    if: false
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Matching Engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/matching_engine.py
